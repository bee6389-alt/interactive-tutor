<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>數學家教建置中</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="circuit-field" aria-hidden="true"></div>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">高職數學 · 建置中</p>
          <h1>數學電子家教老師</h1>
          <p class="hero-copy">這個科目入口已保留，等課程內容完成後會接上正式家教頁。</p>
        </div>
        <div class="meter-card" aria-label="目前建置狀態">
          <span>0%</span>
          <small>建置進度</small>
        </div>
      </header>

      <section class="workspace">
        <section class="launch-card" aria-label="數學建置狀態">
          <div class="launch-status">
            <div>
              <p class="eyebrow">目前任務</p>
              <h2>數學課程尚未建立</h2>
              <p>目前已完成基礎電學與電子學。數學需要另外整理章節、公式、圖形題、診斷題與影片後再上線。</p>
            </div>
          </div>
          <div class="subject-grid">
            <a class="subject-card ready" href="../">
              <span class="subject-tag">返回</span>
              <h3>回到科目首頁</h3>
              <p>先選擇已完成的基礎電學或電子學家教。</p>
              <svg viewBox="0 0 260 120" role="img" aria-label="返回首頁示意圖">
                <path d="M48 62h150" />
                <path d="M92 28 48 62l44 34" />
                <path d="M118 34h86v56h-86" />
              </svg>
              <span class="launch-link">回到首頁</span>
            </a>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
